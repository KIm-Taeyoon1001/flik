<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>flik</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

:root{
  --ink:#16171a;
  --t2:#5f636b;
  --t3:#9a9ea6;
  --t4:#c4c7cd;
  --line:#ececee;
  --line2:#f3f3f5;
  --bg:#fbfbfc;
  --hover:#f5f5f7;
  --shell:1180px;
  --nav:236px;
  --rail:300px;
  --top:64px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;
  background:var(--bg);color:var(--ink);
  font-size:15px;line-height:1.55;letter-spacing:-.18px;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;padding:0;}
input,textarea,select{font-family:inherit;font-size:15px;letter-spacing:-.18px;color:var(--ink);}
a{color:inherit;text-decoration:none;}
.ic{display:block;flex:none;}
::selection{background:#16171a;color:#fff;}

/* ============ TOPBAR ============ */
.top{
  position:sticky;top:0;z-index:60;height:var(--top);
  background:rgba(251,251,252,.85);backdrop-filter:saturate(180%) blur(14px);
  border-bottom:1px solid var(--line);
}
.top-in{max-width:var(--shell);margin:0 auto;height:100%;padding:0 28px;display:flex;align-items:center;gap:24px;}
.logo{font-weight:800;font-size:20px;letter-spacing:-.5px;display:flex;align-items:center;gap:8px;cursor:pointer;}
.logo .dot{width:7px;height:7px;background:var(--ink);border-radius:50%;}
.top-search{flex:1;max-width:420px;position:relative;}
.top-search .ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--t3);}
.top-search input{
  width:100%;height:40px;border:1px solid var(--line);border-radius:11px;
  background:#fff;padding:0 14px 0 40px;outline:none;transition:.15s;
}
.top-search input:focus{border-color:var(--ink);}
.top-actions{display:flex;align-items:center;gap:6px;margin-left:auto;}
.iconbtn{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;color:var(--ink);position:relative;transition:.12s;}
.iconbtn:hover{background:var(--hover);}
.iconbtn .badge{position:absolute;top:7px;right:7px;min-width:8px;height:8px;background:var(--ink);border-radius:50%;border:2px solid var(--bg);}
.me-av{width:34px;height:34px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;cursor:pointer;margin-left:4px;}

/* ============ LAYOUT ============ */
.layout{max-width:var(--shell);margin:0 auto;padding:0 28px;display:grid;grid-template-columns:var(--nav) 1fr;gap:36px;align-items:start;}
aside.nav{position:sticky;top:calc(var(--top) + 24px);padding-top:24px;}
main.main{padding:24px 0 80px;min-width:0;}

/* ============ NAV ============ */
.write-btn{
  width:100%;height:44px;border:1px solid var(--ink);border-radius:11px;
  display:flex;align-items:center;justify-content:center;gap:8px;font-weight:700;font-size:14.5px;
  margin-bottom:22px;transition:.14s;
}
.write-btn:hover{background:var(--ink);color:#fff;}
.nav-sec{margin-bottom:18px;}
.nav-lbl{font-size:11px;font-weight:700;letter-spacing:.6px;color:var(--t4);text-transform:uppercase;padding:0 12px 7px;}
.nav-item{
  width:100%;display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:10px;
  font-size:14.5px;font-weight:500;color:var(--t2);transition:.1s;text-align:left;
}
.nav-item:hover{background:var(--hover);color:var(--ink);}
.nav-item.on{background:var(--ink);color:#fff;font-weight:700;}
.nav-item.on .ic{color:#fff;}
.nav-item .ic{color:var(--t3);}
.nav-item:hover .ic{color:var(--ink);}
.nav-item .bullet{width:5px;height:5px;border-radius:50%;background:var(--t4);margin:0 8px 0 8px;flex:none;}
.nav-item.on .bullet,.nav-item:hover .bullet{background:currentColor;}
.nav-item .cnt{margin-left:auto;font-size:12px;color:var(--t4);font-weight:600;}
.nav-item.on .cnt{color:rgba(255,255,255,.7);}

/* ============ HOME GRID ============ */
.home{display:grid;grid-template-columns:1fr var(--rail);gap:36px;align-items:start;}
.rail{position:sticky;top:calc(var(--top) + 24px);}
@media(max-width:1080px){
  .home{grid-template-columns:1fr;}
  .rail{position:static;}
}

/* ============ PAGE HEAD ============ */
.phead{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;}
.phead h1{font-size:25px;font-weight:800;letter-spacing:-.6px;margin:0;}
.phead .sub{color:var(--t3);font-size:13px;margin-top:5px;}
.backrow{display:flex;align-items:center;gap:6px;margin-bottom:14px;}
.backrow button{display:flex;align-items:center;gap:4px;color:var(--t2);font-size:13.5px;font-weight:600;padding:6px 10px 6px 6px;border-radius:9px;}
.backrow button:hover{background:var(--hover);color:var(--ink);}

/* ============ CARD ============ */
.card{background:#fff;border:1px solid var(--line);border-radius:16px;}
.card + .card{margin-top:16px;}
.card-h{padding:16px 20px;border-bottom:1px solid var(--line2);display:flex;align-items:center;gap:8px;}
.card-h .t{font-weight:700;font-size:15px;}
.card-h .more{margin-left:auto;color:var(--t3);font-size:12.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:2px;}
.card-h .more:hover{color:var(--ink);}

/* ============ POST LIST ============ */
.plist .prow{padding:18px 20px;border-bottom:1px solid var(--line2);cursor:pointer;transition:.1s;display:flex;gap:16px;}
.plist .prow:last-child{border-bottom:none;}
.plist .prow:hover{background:#fcfcfd;}
.prow .pcol{flex:1;min-width:0;}
.prow .bn{font-size:12px;font-weight:600;color:var(--t3);margin-bottom:4px;letter-spacing:-.1px;}
.prow .pt{font-weight:700;font-size:16px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}
.prow .pb{color:var(--t2);font-size:13.5px;margin-top:5px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}
.prow .pm{display:flex;align-items:center;gap:14px;margin-top:11px;color:var(--t3);font-size:12.5px;}
.prow .pm .a{color:var(--t2);font-weight:600;}
.prow .pm .st{display:inline-flex;align-items:center;gap:5px;}
.prow .pm .st .ic{color:var(--t3);}
.prow .pm .sep{margin-left:auto;}
.thumb{width:62px;height:62px;border-radius:11px;object-fit:cover;background:#f0f0f2;flex:none;}

/* mini list (home rail / previews) */
.mlist .mrow{padding:13px 0;border-bottom:1px solid var(--line2);cursor:pointer;}
.mlist .mrow:last-child{border-bottom:none;}
.mlist .mrow:hover .mt{text-decoration:underline;text-underline-offset:2px;}
.mlist .rank{font-weight:800;font-size:13px;color:var(--ink);margin-right:10px;font-variant-numeric:tabular-nums;}
.mlist .mt{font-weight:600;font-size:14px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}
.mlist .mm{color:var(--t3);font-size:12px;margin-top:4px;padding-left:23px;}
.mlist .row-top{display:flex;align-items:baseline;}

/* board chips on home */
.bchips{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:22px;}
.bchip{padding:9px 16px;border:1px solid var(--line);border-radius:11px;background:#fff;font-size:13.5px;font-weight:600;color:var(--t2);transition:.12s;}
.bchip:hover{border-color:var(--ink);color:var(--ink);}

/* ============ POST DETAIL ============ */
.pd{background:#fff;border:1px solid var(--line);border-radius:16px;padding:30px 32px;}
.pd .bn{font-size:12.5px;font-weight:600;color:var(--t3);}
.pd h1{font-size:24px;font-weight:800;letter-spacing:-.5px;margin:9px 0 18px;line-height:1.35;}
.pd .au{display:flex;align-items:center;gap:11px;margin-bottom:22px;padding-bottom:22px;border-bottom:1px solid var(--line2);}
.av{width:38px;height:38px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex:none;}
.av.anon{background:#eceef0;color:#9298a0;}
.au .nm{font-weight:700;font-size:14.5px;}
.au .dt{color:var(--t3);font-size:12.5px;margin-top:1px;}
.au .au-act{margin-left:auto;display:flex;gap:6px;}
.au .au-act button{font-size:12.5px;font-weight:600;color:var(--t2);padding:7px 12px;border:1px solid var(--line);border-radius:9px;transition:.12s;}
.au .au-act button:hover{border-color:var(--ink);color:var(--ink);}
.pd .body{font-size:16px;line-height:1.78;white-space:pre-wrap;word-break:break-word;color:#26272b;}
.react{display:flex;gap:12px;justify-content:center;margin-top:30px;}
.react button{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:13px;padding:11px 26px;font-weight:700;font-size:14px;color:var(--t2);transition:.12s;}
.react button:hover{border-color:var(--ink);color:var(--ink);}
.react button.on{border-color:var(--ink);background:var(--ink);color:#fff;}

/* comments */
.cmts{background:#fff;border:1px solid var(--line);border-radius:16px;margin-top:16px;overflow:hidden;}
.cmt-h{padding:16px 24px;font-weight:700;font-size:15px;border-bottom:1px solid var(--line2);}
.cmt{padding:18px 24px;border-bottom:1px solid var(--line2);}
.cmt:last-of-type{border-bottom:none;}
.cmt.re{padding-left:54px;background:#fcfcfd;position:relative;}
.cmt.re:before{content:"";position:absolute;left:30px;top:24px;width:11px;height:11px;border-left:1.5px solid var(--t4);border-bottom:1.5px solid var(--t4);border-bottom-left-radius:3px;}
.cmt .ch{display:flex;align-items:center;gap:9px;}
.cmt .ch .nm{font-weight:700;font-size:13.5px;}
.cmt .ch .nm.op{display:inline-flex;align-items:center;gap:5px;}
.cmt .ch .nm.op:after{content:"글쓴이";font-size:10px;font-weight:700;background:var(--ink);color:#fff;padding:2px 6px;border-radius:5px;letter-spacing:0;}
.cmt .ch .dt{color:var(--t3);font-size:11.5px;margin-left:2px;flex:1;}
.cmt .ch .del{color:var(--t3);font-size:11.5px;font-weight:600;}
.cmt .ch .del:hover{color:var(--ink);}
.cmt .ctxt{font-size:15px;margin:8px 0 10px;white-space:pre-wrap;word-break:break-word;line-height:1.65;}
.cmt .cact{display:flex;gap:18px;color:var(--t3);font-size:12.5px;font-weight:600;}
.cmt .cact span{cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
.cmt .cact span:hover{color:var(--ink);}
.cmt .cact span.on{color:var(--ink);}

/* comment input */
.cbar{display:flex;gap:10px;align-items:flex-end;padding:16px 24px;border-top:1px solid var(--line2);}
.cbar .toggle{font-size:12.5px;font-weight:700;color:var(--t3);padding:10px 6px;white-space:nowrap;}
.cbar .toggle.on{color:var(--ink);}
.cbar textarea{flex:1;border:1px solid var(--line);border-radius:12px;padding:11px 15px;max-height:120px;min-height:44px;resize:none;outline:none;line-height:1.5;transition:.12s;}
.cbar textarea:focus{border-color:var(--ink);}
.cbar .send{width:44px;height:44px;border-radius:12px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;flex:none;transition:.12s;}
.cbar .send:hover{opacity:.85;}

/* ============ WRITE ============ */
.wf{background:#fff;border:1px solid var(--line);border-radius:16px;padding:8px 28px 24px;}
.wf select{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:11px;margin:20px 0 4px;background:#fff;outline:none;cursor:pointer;}
.wf select:focus{border-color:var(--ink);}
.wf input.tt{width:100%;border:none;border-bottom:1px solid var(--line);padding:18px 2px;font-size:21px;font-weight:700;outline:none;}
.wf input.tt::placeholder{color:var(--t4);}
.wf textarea{width:100%;border:none;padding:18px 2px;font-size:16px;line-height:1.75;min-height:280px;resize:vertical;outline:none;}
.wf .opts{display:flex;align-items:center;gap:10px;padding-top:14px;border-top:1px solid var(--line2);}
.toggle-pill{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;color:var(--t2);padding:9px 15px;border:1px solid var(--line);border-radius:11px;transition:.12s;}
.toggle-pill:hover{border-color:var(--ink);}
.toggle-pill.on{border-color:var(--ink);background:var(--ink);color:#fff;}
.wf .submit{margin-left:auto;background:var(--ink);color:#fff;font-weight:700;font-size:14.5px;padding:12px 30px;border-radius:11px;transition:.12s;}
.wf .submit:hover{opacity:.85;}

/* ============ TIMETABLE ============ */
table.tt{width:100%;border-collapse:separate;border-spacing:0;background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;table-layout:fixed;}
table.tt th,table.tt td{border-right:1px solid var(--line2);border-bottom:1px solid var(--line2);text-align:center;height:64px;padding:0;vertical-align:middle;font-size:13px;}
table.tt th:last-child,table.tt td:last-child{border-right:none;}
table.tt tr:last-child td{border-bottom:none;}
table.tt th{background:#fafafb;color:var(--t2);font-weight:700;height:48px;}
table.tt td.pn{color:var(--t4);font-weight:700;background:#fafafb;}
table.tt td.cell{cursor:pointer;font-weight:700;line-height:1.3;transition:.1s;}
table.tt td.cell.filled{background:var(--ink);color:#fff;}
table.tt td.cell .rm{font-weight:500;opacity:.7;font-size:11px;}
table.tt td.cell:not(.filled):hover{background:var(--hover);}

/* timetable toggle + date nav + meal */
.seg{display:flex;border:1px solid var(--line);border-radius:11px;overflow:hidden;}
.seg button{padding:9px 15px;font-size:12.5px;font-weight:600;color:var(--t2);transition:.12s;}
.seg button.on{background:var(--ink);color:#fff;}
.datenav{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.datenav button{width:40px;height:40px;border:1px solid var(--line);border-radius:11px;display:flex;align-items:center;justify-content:center;color:var(--ink);transition:.12s;}
.datenav button:hover{border-color:var(--ink);}
.datenav span{font-weight:700;font-size:15.5px;}
.datenav button.today{width:auto;padding:0 16px;font-size:13px;font-weight:600;color:var(--t2);margin-left:auto;}
.meal-card{margin-bottom:14px;}
.meal-menu{padding:16px 22px 20px;display:flex;flex-direction:column;gap:9px;font-size:15px;}
.meal-menu div{padding-left:15px;position:relative;color:#26272b;}
.meal-menu div:before{content:"";position:absolute;left:0;top:9px;width:4px;height:4px;border-radius:50%;background:var(--t4);}

/* ============ MESSAGES ============ */
.conv{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--line2);cursor:pointer;transition:.1s;}
.conv:last-child{border-bottom:none;}
.conv:hover{background:#fcfcfd;}
.conv .nm{font-weight:700;font-size:14.5px;}
.conv .lm{color:var(--t2);font-size:13.5px;margin-top:2px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}
.conv .rt{margin-left:auto;color:var(--t3);font-size:11.5px;text-align:right;flex:none;}
.conv .unread{display:inline-block;min-width:18px;height:18px;line-height:18px;background:var(--ink);color:#fff;border-radius:9px;font-size:11px;font-weight:700;padding:0 5px;margin-top:5px;}
.chat{padding:24px;display:flex;flex-direction:column;gap:10px;min-height:400px;max-height:540px;overflow-y:auto;}
.bub{max-width:68%;padding:11px 15px;border-radius:16px;font-size:14.5px;line-height:1.5;word-break:break-word;}
.bub.me{align-self:flex-end;background:var(--ink);color:#fff;border-bottom-right-radius:5px;}
.bub.you{align-self:flex-start;background:var(--hover);border-bottom-left-radius:5px;}
.bub .bt{font-size:10.5px;opacity:.55;margin-top:4px;}

/* ============ PROFILE ============ */
.pf-top{background:#fff;border:1px solid var(--line);border-radius:16px;padding:30px 32px;display:flex;align-items:center;gap:18px;}
.pf-top .av{width:64px;height:64px;font-size:26px;}
.pf-top .nm{font-weight:800;font-size:22px;letter-spacing:-.5px;}
.pf-top .sub{color:var(--t3);font-size:13.5px;margin-top:3px;}
.pf-stats{margin-left:auto;display:flex;gap:30px;text-align:center;}
.pf-stats .n{font-weight:800;font-size:20px;}
.pf-stats .l{color:var(--t3);font-size:12px;margin-top:2px;}
.menu{background:#fff;border:1px solid var(--line);border-radius:16px;margin-top:16px;overflow:hidden;}
.menu button{display:flex;width:100%;align-items:center;gap:13px;padding:17px 22px;border-bottom:1px solid var(--line2);font-size:15px;text-align:left;transition:.1s;}
.menu button:last-child{border-bottom:none;}
.menu button:hover{background:#fcfcfd;}
.menu button .ic{color:var(--t3);}
.menu button .ar{margin-left:auto;color:var(--t4);display:flex;align-items:center;gap:8px;font-weight:600;font-size:13px;}

/* ============ SEARCH ============ */
.chips{display:flex;gap:9px;overflow-x:auto;margin-bottom:22px;padding-bottom:2px;}
.chips button{white-space:nowrap;padding:8px 15px;border-radius:11px;border:1px solid var(--line);background:#fff;font-size:13.5px;font-weight:600;color:var(--t2);transition:.12s;}
.chips button:hover{border-color:var(--ink);}
.chips button.on{background:var(--ink);color:#fff;border-color:var(--ink);}

/* ============ EMPTY ============ */
.empty{text-align:center;color:var(--t3);padding:64px 20px;font-size:14px;line-height:1.7;}
.empty .big{font-size:15px;color:var(--t2);font-weight:600;margin-bottom:4px;}

/* ============ AUTH ============ */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg);}
.auth{width:100%;max-width:380px;}
.auth .logo{font-size:36px;font-weight:800;letter-spacing:-1px;justify-content:center;margin-bottom:8px;}
.auth .logo .dot{width:9px;height:9px;}
.auth .tag{text-align:center;color:var(--t3);margin-bottom:40px;font-size:14px;}
.auth input{width:100%;height:50px;padding:0 16px;border:1px solid var(--line);border-radius:12px;margin-bottom:11px;outline:none;background:#fff;transition:.12s;}
.auth input:focus{border-color:var(--ink);}
.auth .pbtn{width:100%;height:50px;background:var(--ink);color:#fff;font-weight:700;font-size:15.5px;border-radius:12px;margin-top:8px;transition:.12s;}
.auth .pbtn:hover{opacity:.85;}
.auth .sw{text-align:center;color:var(--t3);font-size:13.5px;margin-top:24px;cursor:pointer;}
.auth .sw b{color:var(--ink);font-weight:700;}

/* ---- signup wizard ---- */
.auth.wide{max-width:440px;}
.steps{display:flex;gap:6px;margin:6px 0 26px;}
.steps .step{flex:1;text-align:center;font-size:11.5px;font-weight:600;color:var(--t4);display:flex;flex-direction:column;align-items:center;gap:6px;}
.steps .step .sn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:#fff;}
.steps .step.on{color:var(--ink);}
.steps .step.on .sn{border-color:var(--ink);background:var(--ink);color:#fff;}
.steps .step.done .sn{border-color:var(--ink);background:var(--ink);color:#fff;}
.step-body{animation:fade .2s ease;}
.step-desc{font-size:14px;color:var(--t2);margin:0 0 18px;line-height:1.6;}
.step-desc b{color:var(--ink);}
.field-row{display:flex;gap:9px;margin-bottom:11px;}
.auth select{height:50px;padding:0 12px;border:1px solid var(--line);border-radius:12px;background:#fff;outline:none;cursor:pointer;}
.auth select:focus{border-color:var(--ink);}
.pbtn.ghost{background:#fff;color:var(--ink);border:1px solid var(--ink);}
.pbtn.ghost:hover{background:var(--ink);color:#fff;opacity:1;}
.pbtn.half{flex:1;margin-top:0;}
.pbtn:disabled{background:var(--line);color:var(--t4);cursor:not-allowed;}
.pbtn.ghost:disabled{background:#fff;border-color:var(--line);color:var(--t4);}

.terms-all{display:flex;align-items:center;gap:12px;padding:15px;border:1px solid var(--ink);border-radius:12px;font-size:15px;cursor:pointer;margin-bottom:12px;}
.consent{display:flex;align-items:flex-start;gap:12px;padding:14px;border:1px solid var(--line);border-radius:12px;cursor:pointer;margin-bottom:9px;transition:.12s;}
.consent:hover{border-color:var(--t3);}
.consent b{font-size:13.5px;font-weight:700;}
.consent p{margin:4px 0 0;font-size:12px;color:var(--t3);line-height:1.5;}
.consent.danger{border-color:#e3e3e6;background:#fafafb;}
.consent.danger u{text-decoration:underline;text-underline-offset:2px;font-weight:600;color:var(--ink);}
.cbx{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;flex:none;font-size:13px;font-weight:800;color:#fff;margin-top:1px;}
.cbx.on{background:var(--ink);border-color:var(--ink);}
.age-note{font-size:11.5px;color:var(--t3);margin:14px 2px 18px;line-height:1.5;}
.mock-note{font-size:11px;color:var(--t4);margin-top:10px;line-height:1.5;}

.verified-box{margin-top:6px;padding:13px 16px;border-radius:12px;background:var(--ink);color:#fff;font-size:13.5px;font-weight:600;}
.verified-box.light{background:var(--hover);color:var(--ink);}
.verified-box .rg{color:var(--t3);font-weight:500;margin-left:6px;}

.school-search{position:relative;margin-bottom:11px;}
.school-search input{margin-bottom:0;}
.sc-list{position:absolute;left:0;right:0;top:54px;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 12px 30px rgba(0,0,0,.1);z-index:5;overflow:hidden;display:none;max-height:280px;overflow-y:auto;}
.sc-list.show{display:block;}
.sc-item{display:flex;flex-direction:column;gap:2px;padding:11px 15px;cursor:pointer;border-bottom:1px solid var(--line2);}
.sc-item:last-child{border-bottom:none;}
.sc-item:hover{background:var(--hover);}
.sc-item b{font-size:14px;font-weight:600;}
.sc-item span{font-size:11.5px;color:var(--t3);}
.sc-empty{padding:14px 15px;font-size:12.5px;color:var(--t3);}

.upload{display:block;border:1.5px dashed var(--line);border-radius:14px;padding:26px;text-align:center;cursor:pointer;margin:4px 0 0;transition:.12s;}
.upload:hover{border-color:var(--ink);}
.upload.has{padding:8px;border-style:solid;}
.up-in{display:flex;flex-direction:column;align-items:center;gap:7px;color:var(--t3);}
.up-in .ic{color:var(--t3);}
.up-in span{font-size:13.5px;font-weight:600;color:var(--t2);}
.up-in small{font-size:11px;color:var(--t4);}
.id-preview{width:100%;max-height:200px;object-fit:contain;border-radius:9px;display:block;}

.summary{background:var(--hover);border-radius:12px;padding:14px 16px;margin:14px 0;font-size:13px;}
.summary div{display:flex;gap:10px;padding:4px 0;align-items:center;}
.summary span{color:var(--t3);min-width:42px;font-weight:600;}
.vbadge{margin-left:auto;font-size:10.5px;font-weight:700;background:var(--ink);color:#fff;padding:3px 8px;border-radius:6px;font-style:normal;}

/* profile verified */
.pf-verified{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;background:var(--ink);color:#fff;padding:2px 8px;border-radius:6px;margin-left:8px;vertical-align:middle;}

/* ============ TOAST / MODAL ============ */
#toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:13px 24px;border-radius:13px;font-size:14px;font-weight:600;z-index:200;opacity:0;transition:.22s;pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.16);}
#toast.show{opacity:1;}
.modal{position:fixed;inset:0;background:rgba(20,21,24,.32);backdrop-filter:blur(2px);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;}
.modal .box{background:#fff;border-radius:18px;padding:26px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal h3{margin:0 0 18px;font-size:18px;font-weight:800;letter-spacing:-.4px;}
.modal input{width:100%;height:46px;padding:0 14px;border:1px solid var(--line);border-radius:11px;margin-bottom:10px;outline:none;}
.modal input:focus{border-color:var(--ink);}
.modal .hint{color:var(--t3);font-size:12px;margin:-2px 2px 8px;}
.modal .row{display:flex;gap:10px;margin-top:8px;}
.modal .row button{flex:1;height:46px;border-radius:11px;font-weight:700;font-size:14.5px;transition:.12s;}
.modal .ok{background:var(--ink);color:#fff;}
.modal .ok:hover{opacity:.85;}
.modal .cc{background:var(--hover);color:var(--t2);}
.modal .cc:hover{background:var(--line);}

@keyframes fade{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
main>*{animation:fade .2s ease;}

/* write image preview */
.w-preview{display:flex;flex-wrap:wrap;gap:10px;padding:8px 0;}
.thumb-wrap{position:relative;width:84px;height:84px;}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;border-radius:10px;border:1px solid var(--line);}
.thumb-x{position:absolute;top:-7px;right:-7px;width:22px;height:22px;border-radius:50%;background:var(--ink);color:#fff;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.3);}

/* post detail images */
.pd-imgs{margin-top:16px;display:flex;flex-direction:column;gap:12px;}
.pd-imgs img{width:100%;border-radius:12px;border:1px solid var(--line);}

/* hidden (reported) content */
.hidden-row .pt{font-style:normal;}
.hidden-block{background:var(--hover);border:1px dashed var(--line);border-radius:12px;padding:28px 20px;text-align:center;color:var(--t2);font-size:14px;line-height:1.7;}
.reveal-btn{margin-top:12px;padding:9px 18px;border:1px solid var(--ink);border-radius:10px;font-weight:700;font-size:13px;}
.reveal-btn:hover{background:var(--ink);color:#fff;}

/* report reasons */
.reasons{display:flex;flex-direction:column;gap:8px;margin-bottom:6px;}
.reasons button{text-align:left;padding:13px 15px;border:1px solid var(--line);border-radius:11px;font-size:14.5px;font-weight:600;transition:.12s;}
.reasons button:hover{border-color:var(--ink);background:var(--hover);}

/* unblock button */
.menu .unblock{padding:7px 14px;border:1px solid var(--line);border-radius:9px;font-size:12.5px;font-weight:600;color:var(--t2);}
.menu .unblock:hover{border-color:var(--ink);color:var(--ink);}
</style>
</head>
<body>
<div id="root"></div>
<div id="toast"></div>
<div id="modal-root"></div>

<script>
/* =========================================================================
   flik — 중·고등학생 커뮤니티 (PC web / 모노크롬)
   데이터 접근은 DB 레이어로만 → 추후 Firestore 교체 용이
   ========================================================================= */

/* ---------- 아이콘 (라인 SVG, 모노크롬) ---------- */
const PATHS = {
  home:'<path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.4V20h14V9.4"/>',
  hot:'<path d="M12 3c.5 2.5 2.7 3.4 2.7 6.2 0 1-.5 1.9-1.2 2.5.3-1.4-.4-2.6-1.3-3.2.2 2.3-1.7 2.7-1.7 4.6 0 .5.1.9.3 1.3A4 4 0 0 1 8 11.3c0-3 2.5-3.8 4-8.3z"/><path d="M12 21a5 5 0 0 0 5-5c0-1.6-.7-2.7-1.5-3.6"/>',
  star:'<path d="M12 3.5l2.5 5.2 5.7.8-4.1 4 1 5.7L12 16.5 6.9 19.2l1-5.7-4.1-4 5.7-.8z"/>',
  cal:'<rect x="3.5" y="4.5" width="17" height="16" rx="2.5"/><path d="M3.5 9.2h17M8 3v3.4M16 3v3.4"/>',
  mail:'<rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="M3.6 6.8 12 12.6l8.4-5.8"/>',
  user:'<circle cx="12" cy="8" r="3.6"/><path d="M5 20c0-3.9 3.1-6.2 7-6.2s7 2.3 7 6.2"/>',
  search:'<circle cx="11" cy="11" r="6.5"/><path d="M16 16l4.5 4.5"/>',
  bell:'<path d="M6 9.5a6 6 0 0 1 12 0c0 4.5 1.8 5.5 1.8 5.5H4.2S6 14 6 9.5z"/><path d="M10 19a2.2 2.2 0 0 0 4 0"/>',
  pencil:'<path d="M4.5 19.5h4L19 9 15 5 4.5 15.5z"/><path d="M14 6l4 4"/>',
  back:'<path d="M14.5 5l-7 7 7 7"/>',
  chev:'<path d="M9 6l6 6-6 6"/>',
  send:'<path d="M5 12h13M12.5 6l6 6-6 6"/>',
  like:'<path d="M7 10.5v8.5H4.2v-8.5z"/><path d="M7 10.5l3.6-6.5c1.4 0 2.3 1 1.9 2.7l-.6 2.6h5.4c1.1 0 1.9.9 1.6 2l-1.5 5.1c-.2.8-.9 1.3-1.7 1.3H7"/>',
  bookmark:'<path d="M6.5 4h11v16l-5.5-3.6L6.5 20z"/>',
  comment:'<path d="M4.5 5.5h15v9.5H9l-4.5 4z"/>',
  list:'<path d="M9 6.5h11M9 12h11M9 17.5h11"/><circle cx="4.5" cy="6.5" r="1.1"/><circle cx="4.5" cy="12" r="1.1"/><circle cx="4.5" cy="17.5" r="1.1"/>',
  logout:'<path d="M14 5H6.5A1.5 1.5 0 0 0 5 6.5v11A1.5 1.5 0 0 0 6.5 19H14"/><path d="M17 8l4 4-4 4M21 12H10"/>',
  edit:'<path d="M5 19.5h4L19.5 9 15.5 5 5 15.5z"/><path d="M14 6l4 4"/>',
  meal:'<path d="M7 3v6a2 2 0 0 1-2 2 2 2 0 0 1-2-2V3"/><path d="M5 3v18"/><path d="M17 3c-1.6 1.2-2.5 3.2-2.5 6 0 2 1 3 2.5 3v9"/>',
};
function icon(n, size=22, fill=false){
  const f = fill ? 'currentColor' : 'none';
  return `<svg class="ic" width="${size}" height="${size}" viewBox="0 0 24 24" fill="${f}" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${PATHS[n]}</svg>`;
}

/* ---------- Storage (localStorage 우선, 폴백 메모리) ---------- */
const Store = (() => {
  let mem={}, ok=false;
  try{ localStorage.setItem('__t','1'); localStorage.removeItem('__t'); ok=true; }catch(e){}
  return {
    get(k){ if(ok){try{return localStorage.getItem(k);}catch(e){}} return k in mem?mem[k]:null; },
    set(k,v){ if(ok){try{localStorage.setItem(k,v);return;}catch(e){}} mem[k]=v; }
  };
})();

/* ===========================================================================
   Firebase 설정 (Firestore + Phone Auth)
   ① https://console.firebase.google.com 에서 프로젝트 생성
   ② 빌드 > Firestore Database 만들기 (테스트 모드로 시작 후 규칙 설정)
   ③ 빌드 > Authentication > 로그인 방법 > '전화' 사용 설정
   ④ Authentication > 설정 > 승인된 도메인에 너의 배포 도메인 추가
   ⑤ 프로젝트 설정 > 내 앱(웹) 추가 후 firebaseConfig 복사 → 아래에 붙여넣기
   → 아래 apiKey 가 비어 있으면 자동으로 localStorage 데모 모드로 동작합니다.
   =========================================================================== */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDlvwDO897B3cze3BvZZtMxkp_o2jqH1wM",
  authDomain: "flik-e20a4.firebaseapp.com",
  databaseURL: "https://flik-e20a4-default-rtdb.firebaseio.com",
  projectId: "flik-e20a4",
  storageBucket: "flik-e20a4.firebasestorage.app",
  messagingSenderId: "598453176963",
  appId: "1:598453176963:web:d4b560efa0781a693a29b6"
};

const FB = { on:false, db:null, auth:null };
/* ▼ 개발용 스위치: true = 데모 모드(localStorage·아이디/비번·가짜 인증), false = Firebase(실서비스)
   전화 인증 준비되면 false 로 바꾸면 위 FIREBASE_CONFIG 그대로 실서비스로 전환됨 */
const FORCE_DEMO = true;
const COLS = ['users','posts','comments','msgs','notis','reports'];
let _cache = { users:[], posts:[], comments:[], msgs:[], notis:[], reports:[] };
let _authUid = null;
const fbEnabled = () => FB.on;
const _clone = x => JSON.parse(JSON.stringify(x));

async function initFirebase(){
  if(FORCE_DEMO || !FIREBASE_CONFIG.apiKey || typeof firebase==='undefined'){ return false; }
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    FB.auth = firebase.auth();
    FB.db = firebase.firestore();
    FB.on = true;
    // 실시간 구독: 각 컬렉션이 바뀌면 캐시 갱신 + 재렌더
    COLS.forEach(col=>{
      FB.db.collection(col).onSnapshot(snap=>{
        _cache[col] = snap.docs.map(d=>d.data());
        render();
      }, err=>console.error('onSnapshot '+col, err));
    });
    // 로그인 상태
    FB.auth.onAuthStateChanged(u=>{ _authUid = u? u.uid : null; render(); });
    return true;
  }catch(e){ console.error('Firebase 초기화 실패 → 데모 모드', e); FB.on=false; return false; }
}

// 캐시(또는 새 배열)를 Firestore에 반영: 바뀐 문서만 set, 사라진 문서는 delete
async function _syncCollection(col, arr){
  const cur={}; (_cache[col]||[]).forEach(d=>{ if(d&&d.id!=null) cur[d.id]=d; });
  const seen={}; const ops=[];
  arr.forEach(item=>{
    if(item.id==null) return;
    seen[item.id]=1;
    const old=cur[item.id];
    if(!old || JSON.stringify(old)!==JSON.stringify(item)) ops.push(FB.db.collection(col).doc(String(item.id)).set(item));
  });
  Object.keys(cur).forEach(id=>{ if(!seen[id]) ops.push(FB.db.collection(col).doc(String(id)).delete()); });
  try{ await Promise.all(ops); }catch(e){ console.error('Firestore 저장 실패', e); toast('저장 실패 — 네트워크/권한 확인'); }
}
function _read(col){ if(fbEnabled()) return _clone(_cache[col]||[]); try{return JSON.parse(Store.get('st_'+col))??[];}catch(e){return [];} }
function _save(col, arr){ if(fbEnabled()){ _cache[col]=_clone(arr); _syncCollection(col,arr); } else Store.set('st_'+col, JSON.stringify(arr)); }

/* ---------- DB 레이어 (읽기는 동기 캐시, 쓰기는 Firestore/localStorage) ---------- */
const DB = {
  users(){return _read('users');}, saveUsers(a){_save('users',a);},
  posts(){return _read('posts');}, savePosts(a){_save('posts',a);},
  comments(){return _read('comments');}, saveComments(a){_save('comments',a);},
  msgs(){return _read('msgs');}, saveMsgs(a){_save('msgs',a);},
  notis(){return _read('notis');}, saveNotis(a){_save('notis',a);},
  reports(){return _read('reports');}, saveReports(a){_save('reports',a);},
  timetable(){
    if(fbEnabled()){ const u=session(); return (u&&u.timetable)||{}; }
    try{return JSON.parse(Store.get('st_tt_'+(session()?session().id:'g')))??{};}catch(e){return {};}
  },
  saveTimetable(t){
    if(fbEnabled()){ const u=session(); if(!u)return; const users=DB.users(); const me=users.find(x=>x.id===u.id); if(me){me.timetable=t; DB.saveUsers(users);} }
    else Store.set('st_tt_'+(session()?session().id:'g'), JSON.stringify(t));
  },
  session(){
    if(fbEnabled()) return _authUid ? (_cache.users.find(u=>u.id===_authUid)||null) : null;
    try{return JSON.parse(Store.get('st_session'))??null;}catch(e){return null;}
  },
  saveSession(s){ if(fbEnabled()){ if(s===null) _authUid=null; } else Store.set('st_session', JSON.stringify(s)); }
};

/* ---------- 게시판 ---------- */
const BOARDS=[
  {id:'free',name:'자유게시판'},
  {id:'secret',name:'비밀게시판',forceAnon:true},
  {id:'new',name:'새내기게시판'},
  {id:'info',name:'정보게시판'},
  {id:'exam',name:'시험·내신'},
  {id:'career',name:'진로·입시'},
  {id:'club',name:'동아리'},
  {id:'daily',name:'취미·일상'},
];
const board=id=>BOARDS.find(b=>b.id===id);
const HOT_LINE=5;

/* ---------- 유틸 ---------- */
const $=s=>document.querySelector(s);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const session=()=>DB.session();
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1700);}
function ago(ts){const d=(Date.now()-ts)/1000;if(d<60)return'방금';if(d<3600)return Math.floor(d/60)+'분 전';if(d<86400)return Math.floor(d/3600)+'시간 전';const dt=new Date(ts),n=new Date();if(dt.getFullYear()===n.getFullYear())return(dt.getMonth()+1)+'월 '+dt.getDate()+'일';return dt.getFullYear()+'.'+(dt.getMonth()+1)+'.'+dt.getDate();}
function hhmm(ts){const d=new Date(ts),h=d.getHours(),m=String(d.getMinutes()).padStart(2,'0');return(h<12?'오전 ':'오후 ')+((h%12)||12)+':'+m;}

/* ---------- 익명 라벨 ---------- */
function anonMap(pid){const p=DB.posts().find(x=>x.id===pid);const cs=DB.comments().filter(c=>c.postId===pid).sort((a,b)=>a.createdAt-b.createdAt);const map={};let n=0;if(p)map[p.authorId]='글쓴이';cs.forEach(c=>{if(c.anonymous){if(p&&c.authorId===p.authorId){}else if(!(c.authorId in map)){n++;map[c.authorId]='익명'+n;}}});return map;}
function displayName(aid,anon,pid,isOP){if(!anon){const u=DB.users().find(x=>x.id===aid);return u?u.nick:'(알수없음)';}if(isOP)return'글쓴이';return anonMap(pid)[aid]||'익명';}

/* ---------- 알림 ---------- */
function pushNoti(uId,text,link){if(!uId||(session()&&uId===session().id))return;const ns=DB.notis();ns.unshift({id:uid(),userId:uId,text,link,read:false,createdAt:Date.now()});DB.saveNotis(ns);}
function unreadNotis(){const s=session();if(!s)return 0;return DB.notis().filter(n=>n.userId===s.id&&!n.read).length;}
function unreadMsgs(){const s=session();if(!s)return 0;return DB.msgs().filter(m=>m.toId===s.id&&!m.read).length;}

/* ---------- stats ---------- */
function postStats(p){return{likes:(p.likes||[]).length,cmts:DB.comments().filter(x=>x.postId===p.id).length,scraps:(p.scraps||[]).length};}
function hotPosts(){return DB.posts().filter(p=>(p.likes||[]).length>=HOT_LINE).sort((a,b)=>(b.likes.length-a.likes.length)||(b.createdAt-a.createdAt));}

/* =========================================================================
   라우터 / 렌더
   ========================================================================= */
let route={name:'home',param:null};
function go(name,param){route={name,param};window.scrollTo(0,0);render();}

const NAV_MAIN=[
  {id:'home',ic:'home',t:'홈'},
  {id:'hot',ic:'hot',t:'핫게시판'},
  {id:'best',ic:'star',t:'베스트게시판'},
];
const NAV_MENU=[
  {id:'timetable',ic:'cal',t:'시간표'},
  {id:'meal',ic:'meal',t:'급식'},
  {id:'messages',ic:'mail',t:'쪽지'},
  {id:'profile',ic:'user',t:'내 정보'},
];

function render(){
  if(!session()){renderAuth();return;}
  const root=$('#root');
  root.innerHTML=`
    <header class="top">
      <div class="top-in">
        <div class="logo" onclick="go('home')"><span class="dot"></span>flik</div>
        <div class="top-search">${icon('search',18)}<input id="topsearch" placeholder="게시글 검색" value="${esc(route.name==='search'?searchQ:'')}"></div>
        <div class="top-actions">
          <button class="iconbtn" onclick="go('noti')">${icon('bell',22)}${unreadNotis()?'<span class="badge"></span>':''}</button>
          <button class="iconbtn" onclick="go('messages')">${icon('mail',22)}${unreadMsgs()?'<span class="badge"></span>':''}</button>
          <div class="me-av" onclick="go('profile')">${esc(session().nick[0]||'?')}</div>
        </div>
      </div>
    </header>
    <div class="layout">
      <aside class="nav">
        <button class="write-btn" onclick="openWrite()">${icon('pencil',19)} 글쓰기</button>
        <div class="nav-sec">${NAV_MAIN.map(navItem).join('')}</div>
        <div class="nav-sec">
          <div class="nav-lbl">게시판</div>
          ${BOARDS.map(b=>`<button class="nav-item ${route.name==='board'&&route.param===b.id?'on':''}" onclick="go('board','${b.id}')"><span class="bullet"></span>${b.name}</button>`).join('')}
        </div>
        <div class="nav-sec">
          <div class="nav-lbl">메뉴</div>
          ${NAV_MENU.map(navItem).join('')}
        </div>
      </aside>
      <main class="main" id="view"></main>
    </div>`;

  const v=$('#view');
  switch(route.name){
    case 'home':v.innerHTML=viewHome();break;
    case 'board':v.innerHTML=viewBoard(route.param);break;
    case 'hot':v.innerHTML=viewFeed('hot');break;
    case 'best':v.innerHTML=viewFeed('best');break;
    case 'post':v.innerHTML=viewPost(route.param);break;

let writeImages=[];
function compressImage(file,maxDim,quality){
  return new Promise((res,rej)=>{
    const url=URL.createObjectURL(file),img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}
      else if(h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      res(cv.toDataURL('image/jpeg',quality));
    };
    img.onerror=rej;img.src=url;
  });
}
async function onWriteImage(e){
  const files=[...e.target.files];e.target.value='';
  for(const f of files){
    if(writeImages.length>=4){toast('사진은 최대 4장까지예요');break;}
    try{const data=await compressImage(f,1000,0.7);writeImages.push(data);}catch(_){toast('이미지를 불러오지 못했어요');}
  }
  drawWritePreview();
}
function drawWritePreview(){
  const box=$('#w-preview');if(!box)return;
  box.innerHTML=writeImages.map((src,i)=>`<div class="thumb-wrap"><img src="${src}"><button class="thumb-x" onclick="removeWriteImage(${i})">×</button></div>`).join('');
}
function removeWriteImage(i){writeImages.splice(i,1);drawWritePreview();}

const DAYS=['월','화','수','목','금'],PERIODS=[1,2,3,4,5,6,7];
function pad2(n){return String(n).padStart(2,'0');}
function ymd(d){return d.getFullYear()+pad2(d.getMonth()+1)+pad2(d.getDate());}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function mondayOf(b){const d=new Date(b);d.setHours(0,0,0,0);d.setDate(d.getDate()-((d.getDay()+6)%7));return d;}
function weekDays(b){const m=mondayOf(b);return [0,1,2,3,4].map(i=>addDays(m,i));}
function curAYSEM(){const d=new Date(),y=d.getFullYear(),mo=d.getMonth()+1;if(mo>=3&&mo<=8)return{ay:y,sem:1};if(mo>=9)return{ay:y,sem:2};return{ay:y-1,sem:2};}
function ttSvc(lv){return lv==='고'?'hisTimetable':lv==='중'?'misTimetable':'elsTimetable';}
function cleanMenu(s){return (s||'').replace(/<br\s*\/?>/gi,'\n').replace(/\([0-9.\s]+\)/g,'').replace(/[ \t]+/g,' ').trim();}
async function neisRows(svc,params){
  if(!NEIS_KEY)return [];
  try{
    const u=new URLSearchParams({KEY:NEIS_KEY,Type:'json',pIndex:'1',pSize:'1000',...params});
    const res=await fetch(`${NEIS_BASE}/${svc}?${u.toString()}`);
    const data=await res.json();

  if(!NEIS_KEY){
    const v=kw.toLowerCase();
    return SCHOOL_FALLBACK.filter(s=>s.n.toLowerCase().includes(v)||s.r.includes(v)).slice(0,12);
  }
  if(_neisCache[kw]) return _neisCache[kw];
  try{
    const url=`${NEIS_BASE}/schoolInfo?KEY=${NEIS_KEY}&Type=json&pIndex=1&pSize=100&SCHUL_NM=${encodeURIComponent(kw)}`;
    const res=await fetch(url);
    const data=await res.json();
    const rows=data?.schoolInfo?.[1]?.row||[];
    const out=rows
      .filter(s=>s.SCHUL_KND_SC_NM==='중학교'||s.SCHUL_KND_SC_NM==='고등학교')
      .map(s=>({
        n:s.SCHUL_NM,
        r:(s.LCTN_SC_NM||'').replace(/(특별시|광역시|특별자치시|특별자치도|도)$/,''),
        lv:s.SCHUL_KND_SC_NM==='고등학교'?'고':'중',
        code:s.SD_SCHUL_CODE,        // 표준학교코드 (이후 급식·시간표·인증에 활용)
        office:s.ATPT_OFCDC_SC_CODE, // 시도교육청코드
        addr:s.ORG_RDNMA||''
      }));
    _neisCache[kw]=out;
    return out;
  }catch(e){
    console.warn('NEIS 검색 실패 → 폴백 목록 사용 (CORS 차단 시 프록시 필요)',e);
    const v=kw.toLowerCase();
    return SCHOOL_FALLBACK.filter(s=>s.n.toLowerCase().includes(v)).slice(0,12);
  }
}

/* ---------- 인증/가입 (로그인 + 회원가입 위저드) ---------- */
let authMode='login';
let signupStep=1;
function freshSU(){return {consents:{service:false,privacy:false,resp:false},name:'',birth:'',phone:'',carrier:'SKT',verified:false,uid:null,school:null,grade:'',klass:'',idImage:null,id:'',pw:'',pw2:'',nick:''};}
let su=freshSU();
let _otp={phone:'',confirmation:null,mode:'login'};
function toE164(p){p=(p||'').replace(/[^0-9]/g,'');if(p.startsWith('82'))return '+'+p;if(p.startsWith('0'))return '+82'+p.slice(1);return '+82'+p;}
function resetRecaptcha(){
  try{ if(window._recap&&window._recap.clear) window._recap.clear(); }catch(e){}
  window._recap=null;
  const el=document.getElementById('recaptcha-container'); // 이전 위젯 흔적 제거
  if(el) el.innerHTML='';
}
function makeRecaptcha(){
  resetRecaptcha();
  // compat(v8 스타일): (containerId, params[, app]). auth 객체를 넘기면 invalid-api-key 발생.
  try{ window._recap=new firebase.auth.RecaptchaVerifier('recaptcha-container',{size:'invisible'}); }
  catch(e){ window._recap=new firebase.auth.RecaptchaVerifier('recaptcha-container',{size:'invisible'},firebase.app()); }
  return window._recap;
}
async function sendOTP(rawPhone,mode){
  if(!fbEnabled()){toast('Firebase 설정이 필요해요');return;}
  const phone=toE164(rawPhone);
  if(!/^\+82\d{9,10}$/.test(phone)){toast('휴대폰 번호를 정확히 입력해주세요');return;}
  try{
    const verifier=makeRecaptcha();
    const conf=await FB.auth.signInWithPhoneNumber(phone,verifier);
    _otp={phone,confirmation:conf,mode};
    toast('인증문자를 보냈어요'); promptOTPCode();
  }catch(e){console.error(e);toast('문자 발송 실패: '+(e.code||e.message||''));resetRecaptcha();}
}
function promptOTPCode(){
  modalForm('인증번호 입력',[{id:'code',ph:'문자로 받은 6자리'}],async(v)=>{
    const code=(v.code||'').trim();
    if(!/^\d{6}$/.test(code)){toast('6자리 인증번호를 입력해주세요');return;}
    try{const res=await _otp.confirmation.confirm(code);await onPhoneVerified(res.user);}
    catch(e){console.error(e);toast('인증번호가 올바르지 않아요');}
  },'문자로 받은 6자리 숫자를 입력하세요.');
}
async function onPhoneVerified(user){
  const uidv=user.uid;
  if(_otp.mode==='login'){
    let exists=false;
    try{const d=await FB.db.collection('users').doc(uidv).get();exists=d.exists;}catch(e){}
    if(exists){toast('로그인 완료');go('home');}
    else{su=freshSU();su.uid=uidv;su.phone=_otp.phone;su.verified=true;authMode='signup';signupStep=1;toast('가입되지 않은 번호예요. 회원가입을 진행해요');renderSignup();}
  }else{
    su.uid=uidv;su.phone=_otp.phone;su.verified=true;signupStep=3;renderSignup();
  }
}

function renderAuth(){
  try{if(window._recap&&window._recap.clear)window._recap.clear();}catch(e){}window._recap=null;
  if(authMode==='login'){ renderLogin(); return; }
  renderSignup();
}
function renderLogin(){
  if(fbEnabled())return renderLoginFB();
  $('#root').innerHTML=`<div class="auth-wrap"><div class="auth">
    <div class="logo"><span class="dot"></span>flik</div>

    <input id="a-pw" type="password" placeholder="비밀번호">
    <button class="pbtn" onclick="doLogin()">로그인</button>
    <div class="sw" onclick="startSignup()">계정이 없나요? <b>회원가입</b></div>
  </div></div>`;
  ['a-id','a-pw'].forEach(id=>{const el=$('#'+id);if(el)el.onkeydown=e=>{if(e.key==='Enter')doLogin();};});
}
function renderLoginFB(){
  $('#root').innerHTML=`<div class="auth-wrap"><div class="auth">
    <div class="logo"><span class="dot"></span>flik</div>
    <div class="tag">휴대폰 번호로 로그인</div>
    <input id="l-phone" placeholder="휴대폰 번호 (예: 01012345678)" autocomplete="off">
    <button class="pbtn" onclick="sendOTP($('#l-phone').value,'login')">인증문자 받기</button>
    <div id="recaptcha-container"></div>
    <div class="sw" onclick="startSignup()">처음이신가요? <b>회원가입</b></div>
  </div></div>`;
  const el=$('#l-phone');if(el)el.onkeydown=e=>{if(e.key==='Enter')sendOTP(el.value,'login');};
}
function startSignup(){authMode='signup';signupStep=1;su=freshSU();renderSignup();}

function renderSignup(){
  const steps=['약관 동의','본인인증','학교 인증','계정 생성'];
  const bar=`<div class="steps">${steps.map((s,i)=>`<div class="step ${i+1===signupStep?'on':''} ${i+1<signupStep?'done':''}"><span class="sn">${i+1<signupStep?'✓':i+1}</span>${s}</div>`).join('')}</div>`;
  let inner='';
  if(signupStep===1)inner=stepTerms();
  else if(signupStep===2)inner=stepIdentity();
  else if(signupStep===3)inner=stepSchool();
  else inner=stepAccount();
  $('#root').innerHTML=`<div class="auth-wrap"><div class="auth wide">
    <div class="logo"><span class="dot"></span>flik</div>
    <div class="tag">회원가입</div>
    ${bar}
    <div class="step-body">${inner}</div>
  </div></div>`;
  if(signupStep===1)refreshTermsBtn();
  if(signupStep===3)bindSchoolSearch();
  if(signupStep===4)['s-id','s-pw','s-pw2','s-nick'].forEach(id=>{const el=$('#'+id);if(el)el.onkeydown=e=>{if(e.key==='Enter')finishSignup();};});
}

/* --- Step 1: 약관 + 책임 동의 --- */
function stepTerms(){
  const c=su.consents;
  const all=c.service&&c.privacy&&c.resp;
  return `
  <div class="terms-all" onclick="toggleAll()"><span class="cbx ${all?'on':''}">${all?'✓':''}</span><b>전체 동의</b></div>
  <div class="consent" onclick="tog('service')"><span class="cbx ${c.service?'on':''}">${c.service?'✓':''}</span>
    <div><b>[필수] 서비스 이용약관 동의</b><p>건전하고 서로 존중하는 커뮤니티 이용에 동의합니다.</p></div></div>
  <div class="consent" onclick="tog('privacy')"><span class="cbx ${c.privacy?'on':''}">${c.privacy?'✓':''}</span>
    <div><b>[필수] 개인정보 수집·이용 동의</b><p>본인인증 정보(이름·생년월일), 학교 정보를 가입·운영 목적으로 수집합니다.</p></div></div>
  <div class="consent danger" onclick="tog('resp')"><span class="cbx ${c.resp?'on':''}">${c.resp?'✓':''}</span>
    <div><b>[필수] 게시물 책임 동의</b><p>본인이 작성하는 모든 게시물·댓글·쪽지 등에 대한 <u>법적·도의적 책임은 전적으로 작성자 본인에게 있으며</u>, 이로 인한 문제의 책임이 운영자에게 없음을 확인합니다.</p></div></div>
  <div class="age-note">만 14세 미만은 「개인정보보호법」에 따라 법정대리인(보호자)의 동의가 필요합니다.</div>
  <button class="pbtn" id="terms-next" onclick="step1Next()" disabled>동의하고 계속</button>
  <div class="sw" onclick="authMode='login';renderAuth()">로그인으로 돌아가기</div>`;
}
function tog(k){su.consents[k]=!su.consents[k];renderSignup();}
function toggleAll(){const c=su.consents;const v=!(c.service&&c.privacy&&c.resp);c.service=c.privacy=c.resp=v;renderSignup();}
function refreshTermsBtn(){const b=$('#terms-next');if(b)b.disabled=!(su.consents.service&&su.consents.privacy&&su.consents.resp);}
function step1Next(){if(!(su.consents.service&&su.consents.privacy&&su.consents.resp)){toast('필수 항목에 모두 동의해주세요');return;}signupStep=2;renderSignup();}

function stepIdentity(){
  if(fbEnabled())return stepIdentityFB();
  return `
  <p class="step-desc">본인인증으로 <b>이름과 나이</b>를 확인해요. 중·고등학생만 가입할 수 있어요.</p>

  <div class="mock-note">※ 데모용 인증입니다. 실서비스는 PASS·NICE·통신사 본인인증 연동이 필요합니다.</div>
  <div class="field-row" style="margin-top:14px">
    <button class="pbtn ghost half" onclick="signupStep=1;renderSignup()">이전</button>
    <button class="pbtn half" onclick="step2Next()">다음</button>
  </div>`;
}
function stepIdentityFB(){
  const dispPhone=su.phone&&su.phone.startsWith('+82')?'0'+su.phone.slice(3):su.phone;
  return `
  <p class="step-desc">휴대폰 <b>본인인증</b> — 실제 인증문자가 발송돼요. 중·고등학생만 가입할 수 있어요.</p>
  <input id="i-name" placeholder="이름" value="${esc(su.name)}">
  <input id="i-birth" placeholder="생년월일 8자리 (예: 20100315)" maxlength="8" value="${esc(su.birth)}">
  <input id="i-phone" placeholder="휴대폰 번호 (예: 01012345678)" value="${esc(dispPhone)}">
  ${su.verified?`<div class="verified-box">✓ 휴대폰 인증 완료 · ${esc(su.name)} (만 ${su.age}세)</div>`
    :`<button class="pbtn ghost" onclick="fbRequestVerify()">인증문자 받기</button>`}
  <div id="recaptcha-container"></div>
  <div class="mock-note">휴대폰 번호 소유 인증입니다. 법적 실명·나이 인증(PASS·NICE)은 사업자 등록 후 연동할 수 있어요.</div>
  <div class="field-row" style="margin-top:14px">
    <button class="pbtn ghost half" onclick="signupStep=1;renderSignup()">이전</button>
    <button class="pbtn half" onclick="step2Next()">다음</button>
  </div>`;
}
function ageFromBirth(birth){const y=+birth.slice(0,4),m=+birth.slice(4,6),d=+birth.slice(6,8),now=new Date();let a=now.getFullYear()-y;if(now.getMonth()+1<m||(now.getMonth()+1===m&&now.getDate()<d))a--;return a;}
function fbRequestVerify(){
  const name=$('#i-name').value.trim(),birth=$('#i-birth').value.trim(),phone=$('#i-phone').value.trim();
  if(!name){toast('이름을 입력해주세요');return;}
  if(!/^\d{8}$/.test(birth)){toast('생년월일 8자리를 입력해주세요');return;}
  const age=ageFromBirth(birth);
  if(age<11||age>20){toast('중·고등학생만 가입할 수 있어요 (만 '+age+'세)');return;}
  su.name=name;su.birth=birth;su.age=age;su.phone=phone;
  sendOTP(phone,'signup');
}
function requestVerify(){
  const name=$('#i-name').value.trim(),birth=$('#i-birth').value.trim(),phone=$('#i-phone').value.trim(),carrier=$('#i-carrier').value;
  if(!name){toast('이름을 입력해주세요');return;}
  if(!/^\d{8}$/.test(birth)){toast('생년월일 8자리를 입력해주세요');return;}
  if(!phone){toast('휴대폰 번호를 입력해주세요');return;}
  su.name=name;su.birth=birth;su.phone=phone;su.carrier=carrier;
  // 데모: 인증번호 입력 모달
  modalForm('인증번호 입력',[{id:'code',ph:'문자로 받은 6자리 (데모: 아무 숫자)'}],(v)=>{
    if(!/^\d{4,6}$/.test((v.code||'').trim())){toast('인증번호를 입력해주세요');return;}
    const y=+birth.slice(0,4),m=+birth.slice(4,6),d=+birth.slice(6,8);
    const now=new Date();let age=now.getFullYear()-y;if(now.getMonth()+1<m||(now.getMonth()+1===m&&now.getDate()<d))age--;
    if(age<11||age>20){toast('중·고등학생만 가입할 수 있어요 (만 '+age+'세)');return;}
    su.age=age;su.verified=true;toast('본인인증 완료');renderSignup();
  },'데모 환경에서는 아무 숫자나 입력하면 인증됩니다.');
}
function step2Next(){
  if(!su.verified){
    // 인증 안 했으면 입력값이라도 저장
    su.name=$('#i-name').value.trim();su.birth=$('#i-birth').value.trim();su.phone=$('#i-phone').value.trim();su.carrier=$('#i-carrier').value;
    toast('본인인증을 완료해주세요');return;
  }
  signupStep=3;renderSignup();
}

function stepSchool(){
  const sel=su.school;
  return `

    <div class="sc-list" id="sc-list"></div>

  <div class="field-row">
    <select id="sc-grade-sel">${[1,2,3].map(g=>`<option value="${g}" ${String(su.grade)===String(g)?'selected':''}>${g}학년</option>`).join('')}</select>
    <input id="sc-klass" placeholder="반 (예: 3)" style="flex:1" value="${esc(su.klass||'')}">
  </div>
  <label class="upload ${su.idImage?'has':''}" for="sc-file">
    ${su.idImage?`<img src="${su.idImage}" class="id-preview">`:`<div class="up-in">${icon('edit',24)}<span>학생증 사진 업로드</span><small>이름·학교가 보이게 촬영</small></div>`}
  </label>
  <input type="file" id="sc-file" accept="image/*" style="display:none" onchange="onIdUpload(event)">
  <div class="mock-note">※ 데모용입니다. 실서비스는 학생증 사진을 관리자 검토 또는 OCR로 검증 후 승인합니다.</div>
  <div class="field-row" style="margin-top:14px">
    <button class="pbtn ghost half" onclick="signupStep=2;renderSignup()">이전</button>
    <button class="pbtn half" onclick="step3Next()">다음</button>
  </div>`;
}
let _scTimer=null;
function bindSchoolSearch(){
  const q=$('#sc-q'),list=$('#sc-list');if(!q)return;
  const run=async()=>{
    const kw=q.value.trim();
    if(!kw){list.innerHTML='';list.classList.remove('show');return;}
    list.innerHTML=`<div class="sc-empty">검색 중…</div>`;list.classList.add('show');
    const res=await neisSearch(kw);
    if(q.value.trim()!==kw) return; // 입력이 바뀌었으면 무시
    list.innerHTML=res.length?res.slice(0,12).map(s=>
      `<div class="sc-item" data-n="${esc(s.n)}" data-r="${esc(s.r)}" data-lv="${s.lv}" data-code="${esc(s.code||'')}" data-office="${esc(s.office||'')}">
        <b>${esc(s.n)}</b><span>${esc(s.r)} · ${s.lv}${s.addr?' · '+esc(s.addr):''}</span></div>`).join('')
      :`<div class="sc-empty">‘${esc(kw)}’ 검색 결과 없음 · 직접 입력 가능</div>`;
    list.classList.add('show');
    list.querySelectorAll('.sc-item').forEach(it=>it.onclick=()=>{
      su.school={n:it.dataset.n,r:it.dataset.r,lv:it.dataset.lv,code:it.dataset.code||'',office:it.dataset.office||''};
      renderSignup();
    });
  };
  const debounced=()=>{clearTimeout(_scTimer);_scTimer=setTimeout(run,280);};
  q.oninput=debounced;
  q.onfocus=()=>{ if(q.value.trim()) run(); };
}
function onIdUpload(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=()=>{su.idImage=r.result;renderSignup();};r.readAsDataURL(f);
}
function step3Next(){
  if(!su.school){const v=$('#sc-q').value.trim();if(v)su.school={n:v,r:'직접입력',lv:'-'};else{toast('학교를 선택해주세요');return;}}
  su.grade=$('#sc-grade-sel')?.value||su.grade||'1';
  su.klass=$('#sc-klass')?.value.trim()||'';
  if(!su.idImage){toast('학생증 사진을 업로드해주세요');return;}
  signupStep=4;renderSignup();
}

/* --- Step 4: 계정/프로필 생성 --- */
function stepAccount(){
  const fb=fbEnabled();
  return `
  <p class="step-desc"><b>${esc(su.name||'')}</b> 님, 마지막으로 ${fb?'프로필을':'계정을'} 만들어요.</p>
  ${fb?'':`<input id="s-id" placeholder="아이디" autocomplete="off" value="${esc(su.id)}">
  <input id="s-pw" type="password" placeholder="비밀번호" value="${esc(su.pw)}">

  <input id="s-nick" placeholder="닉네임 (커뮤니티에서 보일 이름)" autocomplete="off" value="${esc(su.nick)}">
  <div class="summary">
    <div><span>이름</span>${esc(su.name)}${su.age?' (만 '+su.age+'세)':''}</div>
    ${fb&&su.phone?`<div><span>휴대폰</span>${esc(su.phone.startsWith('+82')?'0'+su.phone.slice(3):su.phone)} <em class="vbadge">인증완료</em></div>`:''}
    <div><span>학교</span>${esc(su.school?.n||'')}${su.grade?' '+esc(su.grade)+'학년':''}${su.klass?' '+esc(su.klass)+'반':''} <em class="vbadge">학생증 인증</em></div>
  </div>
  <div class="field-row" style="margin-top:8px">
    <button class="pbtn ghost half" onclick="saveStep4();signupStep=3;renderSignup()">이전</button>
    <button class="pbtn half" onclick="finishSignup()">가입 완료</button>
  </div>`;
}
function saveStep4(){su.id=$('#s-id')?.value.trim()||su.id;su.pw=$('#s-pw')?.value||su.pw;su.pw2=$('#s-pw2')?.value||su.pw2;su.nick=$('#s-nick')?.value.trim()||su.nick;}
async function finishSignup(){
  saveStep4();
  if(!su.nick){toast('닉네임을 입력해주세요');return;}
  if(fbEnabled()){
    if(!su.uid){toast('휴대폰 인증을 먼저 완료해주세요');return;}
    const u={
      id:su.uid,nick:su.nick,
      realName:su.name,birth:su.birth,age:su.age,phone:su.phone,verified:true,
      school:su.school?.n||'',schoolInfo:su.school||null,grade:su.grade,klass:su.klass,
      idUploaded:!!su.idImage,schoolVerified:'verified', // 학생증 사진은 Firebase Storage 연동 후 저장 권장
      consents:{...su.consents,agreedAt:Date.now()},createdAt:Date.now()
    };
    const users=DB.users();users.push(u);DB.saveUsers(users);
    toast('가입 완료! flik에 오신 걸 환영해요');authMode='login';go('home');return;
  }
  if(!su.id||!su.pw){toast('아이디·비밀번호를 입력해주세요');return;}
  if(su.pw!==su.pw2){toast('비밀번호가 일치하지 않아요');return;}
  const users=DB.users();if(users.find(u=>u.loginId===su.id)){toast('이미 있는 아이디예요');return;}
  const u={
    id:uid(),loginId:su.id,pw:su.pw,nick:su.nick,
    realName:su.name,birth:su.birth,age:su.age,phone:su.phone,verified:true,
    school:su.school?.n||'',schoolInfo:su.school,grade:su.grade,klass:su.klass,
    idImage:su.idImage,schoolVerified:'verified',
    consents:{...su.consents,agreedAt:Date.now()},createdAt:Date.now()
  };
  users.push(u);DB.saveUsers(users);DB.saveSession(u);toast('가입 완료! flik에 오신 걸 환영해요');authMode='login';go('home');
}
function doLogin(){
  const id=$('#a-id').value.trim(),pw=$('#a-pw').value;
  const u=DB.users().find(x=>x.loginId===id&&x.pw===pw);
  if(!u){toast('아이디 또는 비밀번호가 틀려요');return;}
  DB.saveSession(u);go('home');
}

/* =========================================================================
   모달
   ========================================================================= */
function closeModal(){$('#modal-root').innerHTML='';}
function confirmBox(msg,okLabel,onok){
  $('#modal-root').innerHTML=`<div class="modal" onclick="if(event.target===this)closeModal()"><div class="box"><h3>${esc(msg)}</h3><div class="row"><button class="cc" onclick="closeModal()">취소</button><button class="ok" id="mok">${esc(okLabel)}</button></div></div></div>`;
  $('#mok').onclick=()=>{closeModal();onok();};
}
function modalForm(title,fields,onsave,hint){
  $('#modal-root').innerHTML=`<div class="modal" onclick="if(event.target===this)closeModal()"><div class="box"><h3>${esc(title)}</h3>${fields.map(f=>`<input id="mf-${f.id}" placeholder="${esc(f.ph)}" value="${esc(f.val||'')}">`).join('')}${hint?`<div class="hint">${esc(hint)}</div>`:''}<div class="row"><button class="cc" onclick="closeModal()">취소</button><button class="ok" id="mfok">저장</button></div></div></div>`;
  $('#mfok').onclick=()=>{const v={};fields.forEach(f=>v[f.id]=$('#mf-'+f.id).value);closeModal();onsave(v);};
}

/* ---------- 바인딩 ---------- */
function bindTopSearch(){
  const el=$('#topsearch');if(!el)return;
  el.onkeydown=e=>{if(e.key==='Enter'){searchQ=el.value;if(route.name!=='search')go('search');else renderSearchResults();}};
}
function bindView(){
  if(route.name==='write'){onBoardChange();drawWritePreview();}
  if(route.name==='timetable')loadTimetable();
  if(route.name==='meal')loadMeal();
  if(route.name==='messages'&&route.param){const s=$('#chatscroll');if(s)s.scrollTop=s.scrollHeight;}
  if(route.name==='search'){
    renderSearchResults();
    const chips=$('#schips');if(chips)chips.querySelectorAll('button').forEach(b=>b.onclick=()=>{searchBoard=b.dataset.b;chips.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');renderSearchResults();});
  }
}
